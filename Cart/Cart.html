<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/Cart.css" />
    <title>Your Cart - Elephant Bookstore</title>
  </head>
  <body>
    <nav class="navbar">
      <img src="imgs/elephantBookstoreLogo.jpg" alt="Elephant Bookstore Logo" class="logo" />

      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../Categories/categories.html">Categories</a>
        <a href="../Best Sellers/index.html">Best Sellers</a>
        <a href="../Contact/Contact.html">Contact</a>
      </div>

      <!-- Cart icon with badge -->
      <a href="Cart.html" class="cart-icon-wrap">
        <img src="imgs/Cart.png" alt="carticon" class="cart" />
        <span id="cart-badge" class="cart-badge" style="display:none">0</span>
      </a>

      <div class="search-container">
        <input type="text" placeholder="Search..." />
        <button type="submit" class="submit">
          <img src="imgs/vecteezy_gold-search-icon_11947139.png" alt="search-icon" class="search-icon" />
        </button>
      </div>
    </nav>

    <!-- Columns grid -->
    <div class="grid-container">
      <div class="column1"></div>

      <!-- ═══════════════ CART BODY ═══════════════ -->
      <div class="column2" id="cart-root">
        <!-- Populated by JavaScript below -->
      </div>

      <div class="column3"></div>
    </div>

    <footer>
      <p class="white-p-text">&copy;2012 Elephant Bookstore. All rights reserved.</p>
      <h3>Contact</h3>
      <p class="white-p-text"><a href="tel:+12565550123">📞 (256) 555-0123</a></p>
      <p class="white-p-text"><a href="mailto:support@elephantbookstore.com">✉ Customer Service</a></p>
      <p><a href="mailto:info@elephantbookstore.com">📧 info@elephantbookstore.com</a></p>
      <h3>Locations</h3>
      <p class="white-p-text">123 Main Street, Muscle Shoals, Alabama 35661</p>
      <p class="white-p-text"><a href="#">Privacy Policy</a></p>
    </footer>

    <!-- Shared cart logic -->
    <script src="../cart.js"></script>

    <style>
      /* ── Cart page specific styles ── */
      .cart-icon-wrap { position: relative; display: inline-flex; align-items: center; }
      .cart-badge {
        position: absolute; top: -6px; right: 4px;
        background: #be852c; color: #fff;
        font-size: 11px; font-weight: 700;
        width: 18px; height: 18px; border-radius: 50%;
        align-items: center; justify-content: center;
        font-family: Arial, sans-serif;
      }

      /* Cart table */
      #cart-root { padding: 30px 20px; background: #fffdf5; min-height: 400px; }

      .cart-title {
        font-family: "Times New Roman", serif;
        font-size: 32px; color: #0d1228;
        border-bottom: 2px solid #be852c;
        padding-bottom: 12px; margin-bottom: 24px;
        text-align: left;
      }

      .cart-empty {
        text-align: center; padding: 60px 20px;
        font-family: "Times New Roman", serif;
        font-size: 20px; color: #888;
      }
      .cart-empty a {
        color: #be852c; text-decoration: underline;
      }

      .cart-table {
        width: 100%; border-collapse: collapse;
        font-family: Arial, Helvetica, sans-serif;
      }
      .cart-table th {
        background: #0d1228; color: #ffd97d;
        padding: 10px 12px; text-align: left;
        font-size: 13px; letter-spacing: .05em;
      }
      .cart-table td {
        padding: 14px 12px; border-bottom: 1px solid #e8e0cc;
        vertical-align: middle; font-size: 14px; color: #0d1228;
      }
      .cart-table tr:last-child td { border-bottom: none; }
      .cart-table tr:hover td { background: #fff8e7; }

      .cart-book-cover {
        width: 54px; height: 80px; object-fit: cover;
        border-radius: 4px; box-shadow: 2px 2px 6px rgba(0,0,0,.2);
      }
      .cart-book-title { font-weight: 700; margin-bottom: 3px; }
      .cart-book-author { font-size: 12px; color: #666; }

      .qty-controls { display: flex; align-items: center; gap: 8px; }
      .qty-btn {
        width: 28px; height: 28px; border-radius: 50%;
        border: 1px solid #be852c; background: #fff;
        color: #be852c; font-size: 18px; font-weight: 700;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        line-height: 1; transition: background .2s, color .2s;
      }
      .qty-btn:hover { background: #be852c; color: #fff; }
      .qty-num { font-weight: 700; min-width: 20px; text-align: center; font-size: 15px; }

      .remove-btn {
        background: none; border: none; cursor: pointer;
        color: #c0392b; font-size: 18px; padding: 4px 8px;
        border-radius: 4px; transition: background .2s;
      }
      .remove-btn:hover { background: #fde; }

      /* Totals strip */
      .cart-totals {
        margin-top: 24px; padding: 16px 20px;
        background: #0d1228; border-radius: 8px;
        display: flex; justify-content: space-between; align-items: center;
        flex-wrap: wrap; gap: 12px;
      }
      .cart-totals-label {
        font-family: "Times New Roman", serif;
        font-size: 20px; color: #ffd97d;
      }
      .cart-totals-amount {
        font-family: "Times New Roman", serif;
        font-size: 26px; color: #fff; font-weight: 700;
      }
      .checkout-btn {
        padding: 12px 32px;
        background: linear-gradient(135deg, #be852c, #ffd97d);
        color: #0d1228; border: none; border-radius: 6px;
        font-family: "Times New Roman", serif;
        font-size: 16px; font-weight: 700;
        cursor: pointer; transition: opacity .2s, transform .15s;
        letter-spacing: .03em;
      }
      .checkout-btn:hover { opacity: .88; transform: translateY(-1px); }

      .clear-btn {
        background: none; border: 1px solid #ffd97d;
        color: #ffd97d; padding: 8px 18px; border-radius: 5px;
        font-family: Arial, sans-serif; font-size: 13px;
        cursor: pointer; transition: background .2s, color .2s;
      }
      .clear-btn:hover { background: #ffd97d; color: #0d1228; }
    </style>

    <script>
      // Prices map (id → price). Extend as you add more books.
      const PRICES = {
        'the-women':          18.99,
        'acotar':             17.99,
        'housemaid':          15.99,
        'atomic-habits':      16.99,
        'it-ends-with-us':    14.99,
        'fourth-wing':        19.99,
        'harry-potter':       12.99,
        'fantastic-beasts':   11.99,
        'great-gatsby':        9.99,
        'moby-dick':           8.99,
        'it-king':            16.99,
        'the-shining':        14.99,
      };

      function fmt(n) { return '$' + n.toFixed(2); }

      function renderCart() {
        const root = document.getElementById('cart-root');
        const cart = getCart();

        if (cart.length === 0) {
          root.innerHTML = `
            <h2 class="cart-title">🛒 Your Cart</h2>
            <div class="cart-empty">
              <p>Your cart is empty.</p>
              <p style="margin-top:12px"><a href="../Best Sellers/index.html">Browse Best Sellers</a> or 
              <a href="../Browse Collections/browsecollections.html">Browse Collections</a></p>
            </div>`;
          return;
        }

        let subtotal = 0;
        let rows = '';
        cart.forEach(item => {
          const price = PRICES[item.id] || 0;
          const lineTotal = price * item.qty;
          subtotal += lineTotal;
          rows += `
            <tr>
              <td><img src="${item.cover}" alt="${item.title}" class="cart-book-cover" onerror="this.style.display='none'"></td>
              <td>
                <div class="cart-book-title">${item.title}</div>
                <div class="cart-book-author">${item.author}</div>
              </td>
              <td>${fmt(price)}</td>
              <td>
                <div class="qty-controls">
                  <button class="qty-btn" onclick="adjustQty('${item.id}', -1)">−</button>
                  <span class="qty-num" id="qty-${item.id}">${item.qty}</span>
                  <button class="qty-btn" onclick="adjustQty('${item.id}', +1)">+</button>
                </div>
              </td>
              <td><strong>${fmt(lineTotal)}</strong></td>
              <td><button class="remove-btn" title="Remove" onclick="deleteItem('${item.id}')">🗑</button></td>
            </tr>`;
        });

        root.innerHTML = `
          <h2 class="cart-title">🛒 Your Cart</h2>
          <table class="cart-table">
            <thead>
              <tr>
                <th></th>
                <th>Book</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="cart-totals">
            <div>
              <div class="cart-totals-label">Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} item${cart.reduce((s,i)=>s+i.qty,0)===1?'':'s'})</div>
              <div class="cart-totals-amount">${fmt(subtotal)}</div>
            </div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
              <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
              <button class="checkout-btn" onclick="alert('Checkout coming soon!')">Proceed to Checkout →</button>
            </div>
          </div>`;
      }

      function adjustQty(id, delta) {
        changeQty(id, delta);
        // Update badge + re-render
        updateCartBadge();
        renderCart();
      }

      function deleteItem(id) {
        removeFromCart(id);
        renderCart();
      }

      function clearCart() {
        if (confirm('Remove all items from your cart?')) {
          localStorage.removeItem('elephantCart');
          updateCartBadge();
          renderCart();
        }
      }

      document.addEventListener('DOMContentLoaded', renderCart);
    </script>
  </body>
</html>
